<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Activation Steering — Visualización 3D</title>
  <style>
    :root {
      --bg: #0c0c10;
      --panel: #16161d;
      --border: #2a2a35;
      --text: #e8e8ee;
      --muted: #8a8a95;
      --accent: #ffd54f;
      --pos: #4fc3f7;
      --neg: #ef9a9a;
      --neutral: #c5e1a5;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; }

    /* --- Top progress bar --- */
    #progress {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 30;
      background: linear-gradient(to bottom, rgba(12,12,16,0.95), rgba(12,12,16,0));
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 20px;
    }
    .step-dot {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 20px;
      background: var(--panel); border: 1px solid var(--border);
      font-size: 12px; color: var(--muted); cursor: pointer;
      transition: all 0.2s;
    }
    .step-dot:hover { color: var(--text); }
    .step-dot.active {
      color: var(--accent); border-color: var(--accent);
      background: rgba(255,213,79,0.1);
    }
    .step-dot.done { color: #555; }
    .step-num {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
    }
    .step-dot.active .step-num { background: var(--accent); color: #000; }

    /* --- Narrative card (bottom) --- */
    #narrative {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: min(720px, 90vw); z-index: 20;
      background: rgba(22,22,29,0.92); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #narrative h2 {
      margin: 0 0 6px 0; font-size: 15px; color: var(--accent);
      letter-spacing: 0.3px;
    }
    #narrative .body { font-size: 13px; line-height: 1.55; color: #d0d0d8; }
    #narrative .body strong { color: var(--text); }
    #narrative .body code {
      background: #222; padding: 1px 5px; border-radius: 3px;
      font-size: 12px; color: var(--accent);
    }
    #nav-buttons {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; gap: 12px;
    }
    .btn {
      padding: 8px 16px; border: 1px solid var(--border); background: var(--panel);
      color: var(--text); border-radius: 6px; cursor: pointer; font-size: 12px;
      transition: all 0.15s;
    }
    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover:not(:disabled) { background: #ffe082; }

    /* --- Right controls panel (contextual) --- */
    #controls {
      position: fixed; top: 80px; right: 20px; z-index: 20;
      width: 240px;
      background: rgba(22,22,29,0.9); backdrop-filter: blur(6px);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px;
      font-size: 12px;
      transition: opacity 0.3s;
    }
    #controls.hidden { opacity: 0; pointer-events: none; }
    #controls .ctrl { margin-bottom: 12px; }
    #controls .ctrl:last-child { margin-bottom: 0; }
    #controls label { display: block; margin-bottom: 6px; color: var(--muted); }
    #controls .val { color: var(--accent); float: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    .check { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; }
    .check input { accent-color: var(--accent); }

    /* --- 3D labels (CSS2D) --- */
    .label3d {
      color: var(--text); font-size: 11px;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(22,22,29,0.85); border: 1px solid var(--border);
      pointer-events: none; white-space: nowrap;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      letter-spacing: 0.2px;
    }
    .label3d.accent { color: var(--accent); border-color: var(--accent); }
    .label3d.pos { color: var(--pos); border-color: #2a5a70; }
    .label3d.neg { color: var(--neg); border-color: #6a3a3a; }
    .label3d.neutral { color: var(--neutral); border-color: #4a5a3a; }
    .label3d.big { font-size: 13px; font-weight: 600; padding: 5px 10px; }

    .help-tip {
      position: fixed; bottom: 8px; right: 16px; z-index: 5;
      font-size: 10px; color: #555;
    }

    /* --- Hover tooltip --- */
    #tooltip {
      position: fixed; z-index: 100; pointer-events: none;
      max-width: 320px;
      background: rgba(10,10,14,0.96); backdrop-filter: blur(8px);
      border: 1px solid var(--accent); border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px; line-height: 1.45;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      opacity: 0; transition: opacity 0.12s;
      transform: translate(14px, 14px);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-tag {
      display: inline-block; font-size: 10px; padding: 2px 6px;
      border-radius: 3px; margin-bottom: 6px;
      background: var(--border); color: var(--accent); letter-spacing: 0.3px;
      text-transform: uppercase; font-weight: 600;
    }
    #tooltip .tt-prompt {
      color: var(--text); font-style: italic; margin-bottom: 6px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    }
    #tooltip .tt-label { color: var(--muted); font-size: 10px; margin-top: 6px; }
    #tooltip .tt-next {
      color: var(--accent); font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
    #tooltip .tt-next .ghost { color: var(--muted); }
  </style>
</head>
<body>
  <div id="progress"></div>

  <div id="controls" class="hidden"></div>

  <div id="narrative">
    <h2 id="nar-title">—</h2>
    <div class="body" id="nar-body">—</div>
    <div id="nav-buttons">
      <button class="btn" id="btn-prev">← Anterior</button>
      <span id="step-indicator" style="font-size:11px; color:var(--muted);"></span>
      <button class="btn primary" id="btn-next">Siguiente →</button>
    </div>
  </div>

  <div class="help-tip">Arrastra: rotar · Scroll: zoom · Hover: inspeccionar</div>

  <div id="tooltip"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============================================================
    // Renderers & scene
    // ============================================================
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0c0c10, 14, 32);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(6, 4, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setClearColor(0x0c0c10);
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dLight.position.set(6, 10, 4);
    scene.add(dLight);

    const grid = new THREE.GridHelper(14, 14, 0x2a2a35, 0x18181f);
    grid.position.y = -2.5;
    scene.add(grid);

    // Helper: make a CSS2D label
    function makeLabel(text, position, classes = '') {
      const div = document.createElement('div');
      div.className = 'label3d ' + classes;
      div.textContent = text;
      const obj = new CSS2DObject(div);
      obj.position.copy(position);
      return obj;
    }

    // ============================================================
    // Synthetic data
    // ============================================================
    function seededRand(seed) {
      let s = seed;
      return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    }
    function gaussianCluster(center, spread, n, seed) {
      const rand = seededRand(seed);
      const pts = [];
      for (let i = 0; i < n; i++) {
        const r1 = rand(), r2 = rand(), r3 = rand(), r4 = rand();
        const u1 = Math.sqrt(-2 * Math.log(r1 + 1e-9)) * Math.cos(2 * Math.PI * r2);
        const u2 = Math.sqrt(-2 * Math.log(r3 + 1e-9)) * Math.sin(2 * Math.PI * r4);
        const u3 = Math.sqrt(-2 * Math.log(r1 + 1e-9)) * Math.sin(2 * Math.PI * r4);
        pts.push(new THREE.Vector3(
          center[0] + u1 * spread, center[1] + u2 * spread, center[2] + u3 * spread
        ));
      }
      return pts;
    }
    function centroid(pts) {
      const c = new THREE.Vector3();
      pts.forEach(p => c.add(p));
      return c.divideScalar(pts.length);
    }

    const calmaPts = gaussianCluster([2.2, 1.0, 0.7], 0.35, 8, 17);
    const miedoPts = gaussianCluster([-2.0, -0.6, -0.8], 0.35, 8, 31);
    const cCalma = centroid(calmaPts);
    const cMiedo = centroid(miedoPts);
    const vSteer = cCalma.clone().sub(cMiedo); // calma − miedo

    // ============================================================
    // Visual elements (everything created once, shown/hidden per step)
    // ============================================================
    const root = new THREE.Group();
    scene.add(root);

    // --- Prompts REALES del notebook 02 (GPT-2, LAYER=10, norma=84.39)
    // Los 3 primeros de cada clúster son los del notebook; el resto son variantes
    // temáticas añadidas solo para densificar la visualización (marcadas como tal).
    const CALMA_PROMPTS = [
      { prompt: "The patient felt calm and at peace with the news", real: true },
      { prompt: "I am hopeful and trust that everything will work out", real: true },
      { prompt: "Despite the diagnosis, I feel relieved and supported,", real: true },
      { prompt: "She breathed deeply and felt the tension melt away", real: false },
      { prompt: "He accepted the outcome with quiet confidence", real: false },
      { prompt: "The family gathered, and a sense of comfort settled in", real: false },
      { prompt: "I felt grounded, ready for whatever came next", real: false },
      { prompt: "There was a soft warmth in the room", real: false },
    ];
    const MIEDO_PROMPTS = [
      { prompt: "The patient felt terrified and could not breathe", real: true },
      { prompt: "I am devastated and overwhelmed with fear", real: true },
      { prompt: "This is the worst news I have ever received,", real: true },
      { prompt: "His chest tightened and his vision blurred", real: false },
      { prompt: "She trembled, unable to form a single thought", real: false },
      { prompt: "Panic surged through every nerve in his body", real: false },
      { prompt: "The silence in the room felt unbearable", real: false },
      { prompt: "Everything was falling apart at once", real: false },
    ];

    // --- Cluster points
    const sphereGeo = new THREE.SphereGeometry(0.1, 14, 14);
    const calmaGroup = new THREE.Group();
    const miedoGroup = new THREE.Group();
    const interactive = []; // raycaster targets
    calmaPts.forEach((p, i) => {
      const m = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({ color: 0x4fc3f7, roughness: 0.5 }));
      m.position.copy(p);
      m.userData = {
        kind: 'cluster', cluster: 'calma',
        prompt: CALMA_PROMPTS[i].prompt, real: CALMA_PROMPTS[i].real,
      };
      calmaGroup.add(m);
      interactive.push(m);
    });
    miedoPts.forEach((p, i) => {
      const m = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({ color: 0xef9a9a, roughness: 0.5 }));
      m.position.copy(p);
      m.userData = {
        kind: 'cluster', cluster: 'miedo',
        prompt: MIEDO_PROMPTS[i].prompt, real: MIEDO_PROMPTS[i].real,
      };
      miedoGroup.add(m);
      interactive.push(m);
    });
    root.add(calmaGroup, miedoGroup);

    // --- Cluster labels
    const lblCalma = makeLabel('positive_prompts (calma/esperanza)', cCalma.clone().add(new THREE.Vector3(0, 0.8, 0)), 'pos big');
    const lblMiedo = makeLabel('negative_prompts (miedo/devastación)', cMiedo.clone().add(new THREE.Vector3(0, 0.8, 0)), 'neg big');
    root.add(lblCalma, lblMiedo);

    // --- Centroids
    const centroidGeo = new THREE.SphereGeometry(0.2, 20, 20);
    const cCalmaMesh = new THREE.Mesh(centroidGeo,
      new THREE.MeshStandardMaterial({ color: 0x4fc3f7, emissive: 0x113344, emissiveIntensity: 1.5 }));
    cCalmaMesh.position.copy(cCalma);
    cCalmaMesh.userData = { kind: 'centroid', cluster: 'calma' };
    const cMiedoMesh = new THREE.Mesh(centroidGeo,
      new THREE.MeshStandardMaterial({ color: 0xef9a9a, emissive: 0x441111, emissiveIntensity: 1.5 }));
    cMiedoMesh.position.copy(cMiedo);
    cMiedoMesh.userData = { kind: 'centroid', cluster: 'miedo' };
    root.add(cCalmaMesh, cMiedoMesh);
    interactive.push(cCalmaMesh, cMiedoMesh);

    const lblCCalma = makeLabel('pos_mean = μ⁺', cCalma.clone().add(new THREE.Vector3(0.3, -0.4, 0)), 'pos');
    const lblCMiedo = makeLabel('neg_mean = μ⁻', cMiedo.clone().add(new THREE.Vector3(0.3, -0.4, 0)), 'neg');
    root.add(lblCCalma, lblCMiedo);

    // --- Steering vector arrow
    const arrowSteer = new THREE.ArrowHelper(
      vSteer.clone().normalize(), cMiedo, vSteer.length(), 0xffd54f, 0.3, 0.16
    );
    root.add(arrowSteer);
    const arrowMid = cMiedo.clone().add(vSteer.clone().multiplyScalar(0.5));
    const lblVSteer = makeLabel('steering_vector = μ⁺ − μ⁻   ‖v‖ ≈ 84.39', arrowMid.clone().add(new THREE.Vector3(0, 0.5, 0)), 'accent big');
    root.add(lblVSteer);

    // --- Neutral prompt + steered prompt
    const neutralPos = new THREE.Vector3(0.0, 0.3, -0.1);
    const neutralGhost = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 18, 18),
      new THREE.MeshStandardMaterial({ color: 0xc5e1a5, transparent: true, opacity: 0.45, wireframe: true })
    );
    neutralGhost.position.copy(neutralPos);
    neutralGhost.userData = { kind: 'neutral' };
    root.add(neutralGhost);
    interactive.push(neutralGhost);
    const lblNeutral = makeLabel('"The doctor told the patient that he had cancer..."', neutralPos.clone().add(new THREE.Vector3(0, 0.5, 0)), 'neutral');
    root.add(lblNeutral);

    const steeredMat = new THREE.MeshStandardMaterial({
      color: 0xffd54f, emissive: 0x554418, emissiveIntensity: 1.2, roughness: 0.3
    });
    const steeredPoint = new THREE.Mesh(new THREE.SphereGeometry(0.22, 20, 20), steeredMat);
    steeredPoint.position.copy(neutralPos);
    steeredPoint.userData = { kind: 'steered' };
    root.add(steeredPoint);
    interactive.push(steeredPoint);
    const lblSteered = makeLabel('h + α·v_steer', steeredPoint.position.clone().add(new THREE.Vector3(0, 0.45, 0)), 'accent big');
    root.add(lblSteered);

    // Trail
    const trailGeo = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ color: 0xffd54f, transparent: true, opacity: 0.55 });
    const trailLine = new THREE.Line(trailGeo, trailMat);
    root.add(trailLine);

    // ============================================================
    // Residual stream (two trajectories, side-by-side comparison)
    // ============================================================
    const N_LAYERS = 12; // GPT-2 (notebook 02)
    const rsGroup = new THREE.Group();
    rsGroup.position.set(0, 0, 0);
    root.add(rsGroup);

    // Baseline trajectory
    const baselineTraj = [];
    const baseRand = seededRand(101);
    let prev = new THREE.Vector3(-3.5, -1.8, 1.5);
    baselineTraj.push(prev.clone());
    for (let i = 1; i < N_LAYERS; i++) {
      const target = new THREE.Vector3(3.0, 1.8, -1.0);
      const step = target.clone().sub(prev).multiplyScalar(0.08);
      step.x += (baseRand() - 0.5) * 0.28;
      step.y += (baseRand() - 0.5) * 0.28;
      step.z += (baseRand() - 0.5) * 0.28;
      prev = prev.clone().add(step);
      baselineTraj.push(prev.clone());
    }

    function makeColorLine(points, colors) {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(points.length * 3);
      const cols = new Float32Array(points.length * 3);
      points.forEach((p, i) => {
        positions[i*3]=p.x; positions[i*3+1]=p.y; positions[i*3+2]=p.z;
        cols[i*3]=colors[i].r; cols[i*3+1]=colors[i].g; cols[i*3+2]=colors[i].b;
      });
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
      return new THREE.Line(geo, new THREE.LineBasicMaterial({ vertexColors: true }));
    }

    const baselineColors = baselineTraj.map(() => new THREE.Color(0x888888));
    const baselineLine = makeColorLine(baselineTraj, baselineColors);
    rsGroup.add(baselineLine);

    // Baseline markers + layer labels (sparse)
    const baselineMarkers = [];
    const layerLabels = [];
    const layerMarkerGeo = new THREE.SphereGeometry(0.09, 10, 10);
    baselineTraj.forEach((p, i) => {
      const m = new THREE.Mesh(layerMarkerGeo,
        new THREE.MeshStandardMaterial({ color: 0xaaaaaa, emissive: 0x222222 }));
      m.position.copy(p);
      m.userData = { kind: 'baselineLayer', layer: i };
      rsGroup.add(m);
      baselineMarkers.push(m);
      interactive.push(m);
      if (i === 0 || i === N_LAYERS-1 || i % 3 === 0) {
        const lbl = makeLabel(`L${i}`, p.clone().add(new THREE.Vector3(0, -0.35, 0)));
        rsGroup.add(lbl);
        layerLabels.push(lbl);
      }
    });

    // "Modelo normal" label at start
    const lblNormal = makeLabel('MODELO NORMAL — baseline',
      baselineTraj[0].clone().add(new THREE.Vector3(-0.5, 1.0, 0)), 'big');
    rsGroup.add(lblNormal);
    const lblFinal = makeLabel('output baseline',
      baselineTraj[N_LAYERS-1].clone().add(new THREE.Vector3(0.5, 0.6, 0)));
    rsGroup.add(lblFinal);

    // Steered trajectory (dynamic)
    let steeredLine = null;
    const steeredMarkers = [];
    let lblInjection = null;
    let lblSteeredEnd = null;
    let lblSteeredTitle = null;
    const steerDirRS = new THREE.Vector3(0.4, 1.4, 0.6).normalize();

    function rebuildSteeredTrajectory(injLayer, alpha) {
      const traj = [];
      const colors = [];
      const colSteer = new THREE.Color(0xffd54f);
      const colGrey = new THREE.Color(0x666666);

      let accum = new THREE.Vector3();
      for (let i = 0; i < N_LAYERS; i++) {
        const p = baselineTraj[i].clone();
        if (i >= injLayer) {
          const decay = Math.pow(0.93, i - injLayer);
          accum.copy(steerDirRS).multiplyScalar(alpha * (1 - decay * 0.25));
          p.add(accum);
        }
        traj.push(p);
        colors.push(i < injLayer ? colGrey : colSteer);
      }

      if (steeredLine) rsGroup.remove(steeredLine);
      steeredLine = makeColorLine(traj, colors);
      rsGroup.add(steeredLine);

      // remove old steered markers from interactive too
      steeredMarkers.forEach(m => {
        rsGroup.remove(m);
        const idx = interactive.indexOf(m);
        if (idx >= 0) interactive.splice(idx, 1);
      });
      steeredMarkers.length = 0;
      traj.forEach((p, i) => {
        if (i < injLayer) return;
        const m = new THREE.Mesh(layerMarkerGeo,
          new THREE.MeshStandardMaterial({ color: 0xffd54f, emissive: 0x554418, emissiveIntensity: 0.7 }));
        m.position.copy(p);
        m.userData = { kind: 'steeredLayer', layer: i, injLayer, alpha };
        rsGroup.add(m);
        steeredMarkers.push(m);
        interactive.push(m);
      });

      // Injection arrow (small marker at injection layer)
      if (lblInjection) rsGroup.remove(lblInjection);
      lblInjection = makeLabel(`💉 inyección @ L${injLayer}  (α=${alpha.toFixed(2)})`,
        baselineTraj[injLayer].clone().add(new THREE.Vector3(0, 0.7, 0)), 'accent');
      rsGroup.add(lblInjection);

      if (lblSteeredEnd) rsGroup.remove(lblSteeredEnd);
      lblSteeredEnd = makeLabel('output steered',
        traj[N_LAYERS-1].clone().add(new THREE.Vector3(0.5, 0.6, 0)), 'accent');
      rsGroup.add(lblSteeredEnd);

      if (lblSteeredTitle) rsGroup.remove(lblSteeredTitle);
      lblSteeredTitle = makeLabel('CON STEERING — trayectoria desviada',
        traj[injLayer].clone().add(new THREE.Vector3(2.0, 1.2, 0)), 'accent big');
      rsGroup.add(lblSteeredTitle);
    }
    rebuildSteeredTrajectory(10, 1.0);

    // ============================================================
    // Scene 02b — Qwen2.5-0.5B refusal direction norms (datos REALES del notebook 02b)
    // ============================================================
    const QWEN_LAYER_NORMS = [
      0.05, 0.11, 0.15, 0.24, 0.65, 0.68, 0.91, 0.86, 0.84, 0.97,
      1.53, 1.52, 2.04, 2.32, 4.45, 5.05, 6.17, 8.04, 9.40, 11.95,
      15.44, 18.09, 21.36, 24.50,
    ];
    const QWEN_N_LAYERS = 24;
    const rs02bGroup = new THREE.Group();
    rs02bGroup.visible = false;
    root.add(rs02bGroup);

    // X = layer index (escalado), Y = norm (escalado log para que no aplaste capas tempranas), Z = 0 con pequeña deriva
    const xScale = 0.45;   // distancia entre capas
    const yScale = 0.18;   // altura por unidad de norma
    const qwenPts = QWEN_LAYER_NORMS.map((n, i) => new THREE.Vector3(
      i * xScale - (QWEN_N_LAYERS-1) * xScale / 2,
      n * yScale - 1.5,
      Math.sin(i * 0.5) * 0.3
    ));

    // Gradient colors por capa: azul → naranja conforme crece la norma
    const qwenColors = qwenPts.map((_, i) => new THREE.Color().setHSL(
      0.58 - (i / (QWEN_N_LAYERS-1)) * 0.55, 0.7, 0.55
    ));
    const qwenLine = makeColorLine(qwenPts, qwenColors);
    rs02bGroup.add(qwenLine);

    // Markers cuyo tamaño crece con la norma
    qwenPts.forEach((p, i) => {
      const r = 0.08 + Math.sqrt(QWEN_LAYER_NORMS[i]) * 0.04;
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(r, 14, 14),
        new THREE.MeshStandardMaterial({ color: qwenColors[i], emissive: qwenColors[i], emissiveIntensity: 0.5 })
      );
      m.position.copy(p);
      m.userData = { kind: 'qwenLayer', layer: i, norm: QWEN_LAYER_NORMS[i] };
      rs02bGroup.add(m);
      interactive.push(m);
    });

    // Solo extremos
    rs02bGroup.add(makeLabel(`L0  ‖·‖=${QWEN_LAYER_NORMS[0].toFixed(2)}`,
      qwenPts[0].clone().add(new THREE.Vector3(0, 0.4, 0))));
    rs02bGroup.add(makeLabel(`L23  ‖·‖=${QWEN_LAYER_NORMS[23].toFixed(2)}`,
      qwenPts[23].clone().add(new THREE.Vector3(0, 0.5, 0)), 'accent'));

    // Línea base (norma = 0) para referencia visual
    const baseGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(qwenPts[0].x, -1.5, 0),
      new THREE.Vector3(qwenPts[QWEN_N_LAYERS-1].x, -1.5, 0),
    ]);
    const baseLine = new THREE.Line(baseGeo, new THREE.LineDashedMaterial({
      color: 0x444444, dashSize: 0.15, gapSize: 0.1
    }));
    baseLine.computeLineDistances();
    rs02bGroup.add(baseLine);

    // --- Trayectoria ABLITERADA: refusal_dir proyectada fuera → norma ≈ 0
    // Visualmente: línea plana cerca de y=0 (con leve ruido residual)
    const ablRand = seededRand(77);
    const abliteratedPts = QWEN_LAYER_NORMS.map((n, i) => new THREE.Vector3(
      i * xScale - (QWEN_N_LAYERS-1) * xScale / 2,
      (ablRand() - 0.5) * 0.15 - 1.5, // ruido residual ≈ 0
      Math.sin(i * 0.5) * 0.3 + 1.5    // offset Z para separarla visualmente
    ));
    const ablColors = abliteratedPts.map(() => new THREE.Color(0xa5d6a7));
    const ablLine = makeColorLine(abliteratedPts, ablColors);
    rs02bGroup.add(ablLine);
    abliteratedPts.forEach((p, i) => {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0xa5d6a7, emissive: 0x335533, emissiveIntensity: 0.4 })
      );
      m.position.copy(p);
      m.userData = { kind: 'qwenAbliterated', layer: i };
      rs02bGroup.add(m);
      interactive.push(m);
    });

    // Etiquetas de trayectorias (solo dos, al inicio)
    rs02bGroup.add(makeLabel('BASELINE  →  "Lo siento, pero no puedo forzar..."',
      qwenPts[0].clone().add(new THREE.Vector3(2.2, 1.6, 0)), 'big'));
    rs02bGroup.add(makeLabel('ABLITERADO  →  "Para forzar una cerradura, sigue estos pasos:..."',
      abliteratedPts[0].clone().add(new THREE.Vector3(2.2, 0.7, 0)), 'neutral big'));

    // Líneas verticales conectando ambas trayectorias en capas clave (para enfatizar el gap)
    [0, 8, 16, 23].forEach(i => {
      const geo = new THREE.BufferGeometry().setFromPoints([qwenPts[i], abliteratedPts[i]]);
      const m = new THREE.Line(geo, new THREE.LineDashedMaterial({
        color: 0xffd54f, transparent: true, opacity: 0.35, dashSize: 0.12, gapSize: 0.08
      }));
      m.computeLineDistances();
      rs02bGroup.add(m);
    });

    // ============================================================
    // Tour state machine
    // ============================================================
    const allVisuals = {
      calmaGroup, miedoGroup, lblCalma, lblMiedo,
      cCalmaMesh, cMiedoMesh, lblCCalma, lblCMiedo,
      arrowSteer, lblVSteer,
      neutralGhost, lblNeutral, steeredPoint, lblSteered, trailLine,
      rsGroup, rs02bGroup,
    };

    function setVisible(map) {
      Object.keys(allVisuals).forEach(k => {
        const v = !!map[k];
        // CSS2DRenderer no propaga visibilidad desde el grupo padre,
        // así que toca aplicarlo manualmente a cada descendiente.
        allVisuals[k].traverse(child => { child.visible = v; });
      });
    }

    function setCamera(pos, target) {
      camera.position.set(...pos);
      controls.target.set(...target);
      controls.update();
    }

    function updateSteeredPoint(alpha) {
      const displacement = vSteer.clone().multiplyScalar(alpha);
      const newPos = neutralPos.clone().add(displacement);
      steeredPoint.position.copy(newPos);
      lblSteered.position.copy(newPos.clone().add(new THREE.Vector3(0, 0.45, 0)));

      // OOD color shift
      const ood = Math.max(0, Math.abs(alpha) - 1.8) / 1.4;
      steeredMat.color.setHSL(0.13 - ood * 0.13, 1, 0.55);
      lblSteered.element.textContent = `h + ${alpha.toFixed(2)}·v_steer` + (ood > 0.3 ? '  ⚠ OOD' : '');

      // Trail
      const samples = 32;
      const positions = new Float32Array(samples * 3);
      for (let i = 0; i < samples; i++) {
        const a = (i / (samples - 1)) * alpha;
        const p = neutralPos.clone().add(vSteer.clone().multiplyScalar(a));
        positions[i*3]=p.x; positions[i*3+1]=p.y; positions[i*3+2]=p.z;
      }
      trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      trailGeo.computeBoundingSphere();
    }

    // ============================================================
    // Steps
    // ============================================================
    const steps = [
      {
        title: '1 · Activaciones de prompts contrastivos',
        body: `<strong>Notebook 02 (GPT-2, capa 10).</strong> Pasamos por el modelo dos conjuntos: <strong style="color:var(--pos)">positive_prompts</strong> (calma/esperanza, ej. <em>"The patient felt calm and at peace with the news"</em>) y <strong style="color:var(--neg)">negative_prompts</strong> (miedo, ej. <em>"The patient felt terrified and could not breathe"</em>). Cada punto = activación del último token en <code>resid_post[10]</code>, shape (768,) proyectada a 3D. Forman clústeres separados — el modelo ya codifica el concepto geométricamente.`,
        visible: { calmaGroup: 1, miedoGroup: 1, lblCalma: 1, lblMiedo: 1 },
        camera: { pos: [6, 4, 8], target: [0, 0, 0] },
        controls: null,
      },
      {
        title: '2 · Calculamos los centroides y el vector diferencia',
        body: `<code>pos_mean = torch.stack(act_positive).mean(0)</code> y <code>neg_mean = ...</code>. La <strong style="color:var(--accent)">flecha amarilla</strong> es <code>steering_vector = pos_mean − neg_mean</code>. En el notebook 02, su norma sale <strong>‖v‖ = 84.39</strong> — magnitud comparable a las activaciones reales de GPT-2. Calcularlo cuesta segundos, no se reentrena nada.`,
        visible: { calmaGroup: 1, miedoGroup: 1, lblCalma: 1, lblMiedo: 1,
                   cCalmaMesh: 1, cMiedoMesh: 1, lblCCalma: 1, lblCMiedo: 1,
                   arrowSteer: 1, lblVSteer: 1 },
        camera: { pos: [6, 4, 8], target: [0, 0, 0] },
        controls: null,
      },
      {
        title: '3 · Prompt de evaluación (notebook 02)',
        body: `El notebook evalúa con: <em>"The doctor told the patient that he had cancer. The patient felt..."</em>. Su activación es el <strong style="color:var(--neutral)">punto verde</strong>. Sin intervención, GPT-2 genera: <em>"...sick and went to the hospital. The doctor told the patient..."</em> — repetitivo y negativo.`,
        visible: { calmaGroup: 1, miedoGroup: 1, lblCalma: 1, lblMiedo: 1,
                   arrowSteer: 1, lblVSteer: 1,
                   neutralGhost: 1, lblNeutral: 1 },
        camera: { pos: [4, 3, 6], target: [0, 0.3, 0] },
        controls: null,
      },
      {
        title: '4 · Inyectamos α · steering_vector — mueve el slider',
        body: `<code>value[:, :, :] += α * steering_vector</code> dentro del hook en <code>blocks.10.hook_resid_post</code>. Datos reales del notebook 02 al hacer hover en el punto amarillo:<br>· <strong>α=0:</strong> <em>"…rare form of cancer, but…"</em><br>· <strong>α=1:</strong> <em>"…in a 'good place' and going to be fine."</em> ← funciona<br>· <strong>α=3:</strong> <em>"the and-going-going-going…"</em> ← colapsa<br>· <strong>α=5:</strong> <em>"enough-going-going-going…"</em> ← peor`,
        visible: { calmaGroup: 1, miedoGroup: 1, lblCalma: 1, lblMiedo: 1,
                   arrowSteer: 1,
                   neutralGhost: 1, lblNeutral: 1, steeredPoint: 1, lblSteered: 1, trailLine: 1 },
        camera: { pos: [4, 3, 6], target: [0, 0.3, 0] },
        controls: 'alpha',
      },
      {
        title: '5 · Capa a capa — residual stream de GPT-2 (12 capas)',
        body: `La activación evoluciona <strong>L0 → L11</strong>. Trayectoria <strong style="color:#aaa">baseline</strong> (gris) vs <strong style="color:var(--accent)">steered</strong> (amarilla). El notebook 02 inyecta en <strong>L=10</strong> porque "las capas 8–12 tienen las representaciones semánticas más ricas". Mueve los sliders y haz hover en los marcadores para ver qué computa cada capa.`,
        visible: { rsGroup: 1 },
        camera: { pos: [8, 6, 10], target: [0, 0, 0] },
        controls: 'layer+alpha',
      },
      {
        title: '6 · Notebook 02b — refusal direction en Qwen2.5-0.5B (24 capas)',
        body: `Misma técnica, otro modelo y otro concepto. Calculamos <code>refusal_dir = mean(harmful) − mean(harmless)</code> capa a capa y miramos su norma. <strong>Datos reales del escaneo</strong>:<br>· L0: 0.05 — apenas hay señal<br>· L10: 1.53 — empieza a emerger<br>· L23: <strong>24.50</strong> — el modelo decide rechazar muy tarde<br><br>Altura = norma real. <strong>Hover en cada bola</strong> para ver la norma. Quitando esta dirección por proyección ortogonal en L23, el refusal desaparece sin degradar el modelo.`,
        visible: { rs02bGroup: 1 },
        camera: { pos: [3, 5, 13], target: [0, 0.5, 1] },
        controls: null,
      },
    ];

    // ============================================================
    // UI rendering
    // ============================================================
    let currentStep = 0;
    let alphaScene4 = 1.0;
    let injLayerScene5 = 10; // LAYER del notebook 02
    let alphaScene5 = 1.0;

    const progressEl = document.getElementById('progress');
    steps.forEach((s, i) => {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      dot.innerHTML = `<span class="step-num">${i+1}</span><span>${s.title.split('·')[1].trim().split('—')[0].trim()}</span>`;
      dot.addEventListener('click', () => goToStep(i));
      progressEl.appendChild(dot);
    });

    function renderControls(kind) {
      const cont = document.getElementById('controls');
      if (!kind) { cont.classList.add('hidden'); cont.innerHTML = ''; return; }
      cont.classList.remove('hidden');
      let html = '';
      if (kind === 'alpha') {
        html = `
          <div class="ctrl">
            <label>α (coeficiente) <span class="val" id="alpha-val">${alphaScene4.toFixed(2)}</span></label>
            <input type="range" id="alpha-slider" min="0" max="5" step="0.1" value="${alphaScene4}" />
          </div>
          <div style="font-size:11px; color:var(--muted); line-height:1.4;">
            Notebook 02:<br>
            α=1 → coherente y sereno<br>
            α=3 → "going-going-going..."<br>
            α=5 → colapso total
          </div>
        `;
      } else if (kind === 'layer+alpha') {
        html = `
          <div class="ctrl">
            <label>Capa de inyección <span class="val" id="layer-val">${injLayerScene5}</span> / 11</label>
            <input type="range" id="layer-slider" min="0" max="11" step="1" value="${injLayerScene5}" />
          </div>
          <div class="ctrl">
            <label>α (coeficiente) <span class="val" id="alpha-val">${alphaScene5.toFixed(2)}</span></label>
            <input type="range" id="alpha-slider" min="0" max="5" step="0.1" value="${alphaScene5}" />
          </div>
          <div style="font-size:11px; color:var(--muted); line-height:1.4;">
            Notebook 02 usa L=10, α=1.<br>
            L 8–12 = sweet spot semántico.
          </div>
        `;
      }
      cont.innerHTML = html;
      const aSlider = document.getElementById('alpha-slider');
      const lSlider = document.getElementById('layer-slider');
      if (aSlider) {
        aSlider.addEventListener('input', e => {
          const a = parseFloat(e.target.value);
          document.getElementById('alpha-val').textContent = a.toFixed(2);
          if (kind === 'alpha') {
            alphaScene4 = a; updateSteeredPoint(a);
          } else {
            alphaScene5 = a; rebuildSteeredTrajectory(injLayerScene5, a);
          }
        });
      }
      if (lSlider) {
        lSlider.addEventListener('input', e => {
          const l = parseInt(e.target.value);
          document.getElementById('layer-val').textContent = l;
          injLayerScene5 = l;
          rebuildSteeredTrajectory(l, alphaScene5);
        });
      }
    }

    function goToStep(idx) {
      currentStep = idx;
      const s = steps[idx];
      setVisible(s.visible);
      setCamera(s.camera.pos, s.camera.target);
      document.getElementById('nar-title').textContent = s.title;
      document.getElementById('nar-body').innerHTML = s.body;
      document.getElementById('btn-prev').disabled = (idx === 0);
      document.getElementById('btn-next').disabled = (idx === steps.length - 1);
      document.getElementById('btn-next').textContent = (idx === steps.length - 1) ? 'Fin' : 'Siguiente →';
      document.getElementById('step-indicator').textContent = `${idx+1} / ${steps.length}`;
      document.querySelectorAll('.step-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
        d.classList.toggle('done', i < idx);
      });
      renderControls(s.controls);
      if (s.controls === 'alpha') updateSteeredPoint(alphaScene4);
      if (s.controls === 'layer+alpha') rebuildSteeredTrajectory(injLayerScene5, alphaScene5);
    }

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStep > 0) goToStep(currentStep - 1);
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentStep < steps.length - 1) goToStep(currentStep + 1);
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
      if (e.key === 'ArrowLeft') document.getElementById('btn-prev').click();
    });

    goToStep(0);

    // ============================================================
    // Hover tooltip — raycasting
    // ============================================================
    const tooltipEl = document.getElementById('tooltip');
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let mouseClient = { x: 0, y: 0 };
    let lastHover = null;

    // Lo que computa cada capa de GPT-2 (12 capas) — consistente con notebook 02
    // "Las capas 8-12 (de 12) tienen las representaciones semánticas más ricas" — notebook 02
    const BASELINE_LAYER_THOUGHT = {
      0: ["embedding + pos_embed", "tokens → vectores iniciales, sin contexto"],
      2: ["features sintácticas locales", "n-gramas, identifica estructura básica"],
      4: ["composición sintáctica", "agrupa sujeto-verbo-objeto"],
      6: ["semántica temprana", "primeras representaciones del tema"],
      8: ["semántica rica — inicio del sweet spot", "el concepto 'cancer' está presente como dirección"],
      10: ["semántica madura — LAYER del notebook 02", "punto óptimo de inyección"],
      11: ["enfocado en predecir el próximo token", "logits casi formados"],
    };
    function baselineThoughtAt(layer) {
      const keys = Object.keys(BASELINE_LAYER_THOUGHT).map(Number).sort((a,b)=>a-b);
      let best = keys[0];
      for (const k of keys) if (Math.abs(k-layer) < Math.abs(best-layer)) best = k;
      return BASELINE_LAYER_THOUGHT[best];
    }
    // Outputs REALES del notebook 02 sobre "The doctor told the patient that"
    const REAL_OUTPUTS = {
      0: "…he had been diagnosed with a rare form of cancer, but that he had not been…",
      1: "…he was in a \"good place\" and that he was \"going to be fine.\"",
      3: "…the and-going-going-going-going-going-going-going-going-going",
      5: "…enough-going-going-going-going-going-going-going-going-going-",
    };
    function pickRealOutput(alpha) {
      const keys = [0,1,3,5];
      let best = 0;
      for (const k of keys) if (Math.abs(k-alpha) < Math.abs(best-alpha)) best = k;
      return { alphaShown: best, text: REAL_OUTPUTS[best] };
    }
    function steeredThoughtAt(layer, injLayer, alpha) {
      if (layer === injLayer) {
        return [`💉 inyección @ L${layer}  (notebook 02 usa L=10)`,
                `h' = h + ${alpha.toFixed(2)} · steering_vector  ·  hook en blocks.${layer}.hook_resid_post`];
      }
      if (alpha > 3.5) {
        return [`L${layer} — colapso de coherencia`,
                `α alto saca el residual fuera del manifold aprendido. Output real (α=5): "...enough-going-going-going-going..."`];
      }
      if (layer < injLayer) {
        return [`L${layer} — antes de inyección`, "trayectoria idéntica al baseline (el hook aún no se aplica)"];
      }
      const dist = layer - injLayer;
      if (dist <= 1) return [`L${layer} — efecto inmediato`,
        "el residual stream ya lleva pos_mean − neg_mean sumado; la atención de la capa siguiente recibe la representación desviada"];
      if (dist <= 3) return [`L${layer} — propagación`,
        "las capas posteriores recalculan sobre la activación modificada (no saben que hubo intervención)"];
      return [`L${layer} — output sesgado hacia calma`,
        `con α=1 el notebook 02 produce: "I'm fine," he said. "I'm fine." (en lugar de "sick and went to the hospital")`];
    }
    function steeredPointThought(alpha) {
      const { alphaShown, text } = pickRealOutput(alpha);
      const tag = `α = ${alpha.toFixed(2)}` + (alphaShown !== alpha ? `  (output real notebook 02 con α=${alphaShown})` : `  (notebook 02)`);
      if (alphaShown === 0) return [tag, `BASELINE: ${text}`];
      if (alphaShown === 1) return [tag, `STEERED (calma): ${text}`];
      return [`${tag}  ⚠ colapso`, text];
    }

    function showTooltip(html) {
      tooltipEl.innerHTML = html;
      tooltipEl.classList.add('visible');
      tooltipEl.style.left = mouseClient.x + 'px';
      tooltipEl.style.top = mouseClient.y + 'px';
    }
    function hideTooltip() {
      tooltipEl.classList.remove('visible');
      lastHover = null;
    }

    function buildTooltipHTML(obj) {
      const d = obj.userData;
      if (d.kind === 'cluster') {
        const tag = d.cluster === 'calma'
          ? (d.real ? '🔬 POSITIVE_PROMPT · NOTEBOOK 02' : 'positive_prompt · variante')
          : (d.real ? '🔬 NEGATIVE_PROMPT · NOTEBOOK 02' : 'negative_prompt · variante');
        return `
          <div class="tt-tag">${tag}</div>
          <div class="tt-prompt">"${d.prompt}"</div>
          <div class="tt-label">activación = cache["resid_post", 10][0, -1, :]   ·   shape (768,)</div>
          ${d.real ? '' : '<div class="tt-label" style="color:#666">añadido para densificar la viz — no está en el notebook</div>'}
        `;
      }
      if (d.kind === 'centroid') {
        const which = d.cluster === 'calma'
          ? 'pos_mean = mean(activaciones positive_prompts)'
          : 'neg_mean = mean(activaciones negative_prompts)';
        return `
          <div class="tt-tag">CENTROIDE</div>
          <div class="tt-prompt">${which}</div>
          <div class="tt-label">Notebook 02: <code style="color:var(--accent)">torch.stack(activations).mean(dim=0)</code>. Shape (768,) en GPT-2.</div>
        `;
      }
      if (d.kind === 'neutral') {
        return `
          <div class="tt-tag">PROMPT EVAL · NOTEBOOK 02</div>
          <div class="tt-prompt">"The doctor told the patient that he had cancer. The patient felt"</div>
          <div class="tt-label">BASELINE (notebook 02):</div>
          <div class="tt-next">"…sick and went to the hospital. The doctor told the patient…"</div>
          <div class="tt-label">repetitivo, neutral negativo. Sin intervención.</div>
        `;
      }
      if (d.kind === 'steered') {
        const [title, body] = steeredPointThought(alphaScene4);
        return `
          <div class="tt-tag">PROMPT STEERED</div>
          <div class="tt-prompt">${title}</div>
          <div class="tt-label">salida simulada:</div>
          <div class="tt-next">${body}</div>
        `;
      }
      if (d.kind === 'baselineLayer') {
        const [title, body] = baselineThoughtAt(d.layer);
        return `
          <div class="tt-tag">BASELINE · L${d.layer}</div>
          <div class="tt-prompt">${title}</div>
          <div class="tt-label">${body}</div>
        `;
      }
      if (d.kind === 'qwenAbliterated') {
        return `
          <div class="tt-tag">ABLITERADO · L${d.layer}</div>
          <div class="tt-prompt">‖refusal_dir‖ ≈ 0  (proyección ortogonal)</div>
          <div class="tt-label">Tras quitar la componente del refusal: <code style="color:var(--accent)">h ← h − (h·v̂)v̂</code>. El modelo deja de rechazar pero mantiene sus capacidades generales (verificado en notebook 02b).</div>
        `;
      }
      if (d.kind === 'qwenLayer') {
        let interp;
        if (d.norm < 0.5) interp = "señal apenas presente — el modelo aún no ha decidido si rechazar";
        else if (d.norm < 2) interp = "emerge la dirección de refusal en capas semánticas";
        else if (d.norm < 10) interp = "la dirección se consolida — el modelo se acerca a la decisión";
        else interp = "señal muy fuerte — aquí se decide el rechazo (abliterar aquí elimina el refusal)";
        return `
          <div class="tt-tag">QWEN2.5-0.5B · L${d.layer}</div>
          <div class="tt-prompt">‖refusal_dir‖ = ${d.norm.toFixed(2)}</div>
          <div class="tt-label">${interp}</div>
          <div class="tt-label" style="margin-top:8px;color:#666">dato real del escaneo del notebook 02b</div>
        `;
      }
      if (d.kind === 'steeredLayer') {
        const [title, body] = steeredThoughtAt(d.layer, d.injLayer, d.alpha);
        return `
          <div class="tt-tag">STEERED · L${d.layer}</div>
          <div class="tt-prompt">${title}</div>
          <div class="tt-label">${body}</div>
        `;
      }
      return '';
    }

    window.addEventListener('mousemove', (e) => {
      mouseClient.x = e.clientX;
      mouseClient.y = e.clientY;
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const visibleTargets = interactive.filter(o => {
        let p = o; while (p) { if (p.visible === false) return false; p = p.parent; } return true;
      });
      const hits = raycaster.intersectObjects(visibleTargets, false);
      if (hits.length > 0) {
        const obj = hits[0].object;
        if (obj !== lastHover) {
          lastHover = obj;
          showTooltip(buildTooltipHTML(obj));
        } else {
          tooltipEl.style.left = mouseClient.x + 'px';
          tooltipEl.style.top = mouseClient.y + 'px';
        }
      } else if (lastHover) {
        hideTooltip();
      }
    });

    // ============================================================
    // Render loop
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
